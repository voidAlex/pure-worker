name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write
  id-token: write
  pages: write

env:
  CI: false

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm eslint src/

      - name: Frontend typecheck
        run: pnpm tsc --noEmit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-pages:
    name: Build Pages
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    name: Deploy Pages
    needs: build-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  tauri-build:
    name: Build (${{ matrix.platform }})
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect bundle outputs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundlePaths = @(
            "src-tauri/target/${{ matrix.rust_target }}/release/bundle",
            "src-tauri/target/release/bundle"
          )
          foreach ($bundlePath in $bundlePaths) {
            if (Test-Path $bundlePath) {
              Write-Host "Found bundle directory: $bundlePath"
              Get-ChildItem -Path $bundlePath -Recurse | Select-Object FullName
            } else {
              Write-Warning "Bundle directory not found: $bundlePath"
            }
          }

      - name: Inspect bundle outputs (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for dir in \
            "src-tauri/target/${{ matrix.rust_target }}/release/bundle" \
            "src-tauri/target/release/bundle"; do
            if [ -d "$dir" ]; then
              echo "Found bundle directory: $dir"
              find "$dir" -type f
            else
              echo "Warning: Bundle directory not found: $dir"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pureworker-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
            apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
