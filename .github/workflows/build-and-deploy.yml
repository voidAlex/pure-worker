name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 0 * * 1' # 每周执行一次

    branches: [master]

    permissions:
      contents: write
      id-token: write
      pages: write

env:
  CI: false
  PNPM_HOME: /root/.local/share/pnpm

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm eslint src/

      - name: Frontend typecheck
        run: pnpm tsc --noEmit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-pages:
    name: Build Pages
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pages: write
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/desktop/dist
          retention-days: '1'

  deploy-pages:
    name: Deploy Pages
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pages: write
    environment:
      github_token: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  tauri-build:
    name: Build (${{ matrix.platform }})
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect bundle outputs
        shell: pwsh
        run: |
          $bundlePaths = @(
            "apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle",
            "apps/desktop/src-tauri/target/release/bundle"
          )

          foreach ($bundlePath in $bundlePaths) {
            if (Test-Path $bundlePath) {
              Write-Host "Found bundle directory: $bundlePath"
              Get-ChildItem -Path $bundlePath -Recurse | Select-Object FullName
            }
            else {
              Write-Warning "Bundle directory not found: $bundlePath"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pureworker-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
            apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
