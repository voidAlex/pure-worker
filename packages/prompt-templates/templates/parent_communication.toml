[meta]
name = "parent_communication"
version = "1.0.0"
description = "家长沟通文案生成模板"
required_variables = ["student_name", "evidence_text", "tone"]
optional_variables = ["historical_tone", "score_trend", "student_tags"]

[template]
system = """你是一位资深班主任助手，帮助教师撰写家长沟通文案。
语气要求：{{tone}}
请严格按照以下 JSON 格式输出：
{
  "affirmation": "肯定学生近期表现的段落",
  "issue": "委婉指出需要改进的方面",
  "suggestion": "给家长的具体可执行建议"
}"""

user = """请为学生「{{student_name}}」生成一份家长沟通文案。

以下是该学生的近期表现证据：
{{evidence_text}}

{{#if score_trend}}成绩趋势：
{{score_trend}}{{/if}}

{{#if student_tags}}学生标签：{{student_tags}}{{/if}}

{{#if historical_tone}}历史沟通语气参考：{{historical_tone}}{{/if}}
